name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt -r requirements-dev.txt

      - name: Compile application modules
        run: |
          python -m py_compile \
            src/app.py \
            src/agent.py \
            src/rag_engine.py \
            src/validator.py \
            src/pdf_report.py \
            src/train_model.py

      - name: Run test suite
        run: python -m pytest tests/
